apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orderflow-flink
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/w1024ji/orderflow.git
    targetRevision: main
    path: deploy/k8s/flink
  destination:
    server: https://kubernetes.default.svc
    namespace: data-pipeline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false