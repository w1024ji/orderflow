name: Flink Job CI

on:
  push:
    branches: [main]
    paths:
      - 'flink-job/**'
      - '.github/workflows/flink-job-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flink-job/**'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/orderflow-flink-job

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flink-job
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build (skip tests)
        run: mvn clean package -DskipTests

      # 테스트가 준비되면 위 스텝을 아래로 교체
      # - name: Build and test
      #   run: mvn clean package

  build-and-push:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: flink-job
          file: flink-job/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update manifest with new image tag
        run: |
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|" deploy/k8s/flink/flink-cluster.yaml
          cat deploy/k8s/flink/flink-cluster.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/flink/flink-cluster.yaml
          git diff --staged --quiet || git commit -m "chore: update flink-job image to ${{ github.sha }}"
          git push