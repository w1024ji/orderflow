apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderflow-producer
  namespace: data-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orderflow-producer
  template:
    metadata:
      labels:
        app: orderflow-producer
    spec:
      containers:
        - name: producer
          image: ghcr.io/w1024ji/orderflow-producer:fd0b5a17dfc30a1fd8fe462e248c588d2643a05e
          imagePullPolicy: Always
          env:
            - name: PYTHONUNBUFFERED
              value: "1"